services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: development
      HTTP_ADDR: :8800
      DATABASE_DSN: root:root@tcp(mysql:3306)/mydb?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me-to-a-long-random-secret
      PASSWORD_CRYPTO_KEY: change-me-for-password-compat-encryption
      SEED_USERNAME: test
      SEED_PASSWORD: Aa123456
    ports:
      - "8800:8800"

volumes:
  mysql-data:

