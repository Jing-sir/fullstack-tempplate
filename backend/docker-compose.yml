services:
  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: auth_service
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_permission.up.sql:/docker-entrypoint-initdb.d/002_permission.up.sql:ro
      - ./migrations/003_operation_log.up.sql:/docker-entrypoint-initdb.d/003_operation_log.up.sql:ro
      - ./migrations/004_menu_type_refactor.up.sql:/docker-entrypoint-initdb.d/004_menu_type_refactor.up.sql:ro
      - ./migrations/005_account_hidden_routes.up.sql:/docker-entrypoint-initdb.d/005_account_hidden_routes.up.sql:ro
      - ./migrations/006_button_permissions.up.sql:/docker-entrypoint-initdb.d/006_button_permissions.up.sql:ro
      - ./migrations/007_superadmin_new_menus.up.sql:/docker-entrypoint-initdb.d/007_superadmin_new_menus.up.sql:ro
      - ./migrations/008_permission_hardening.up.sql:/docker-entrypoint-initdb.d/008_permission_hardening.up.sql:ro
      - ./migrations/009_business_permissions.up.sql:/docker-entrypoint-initdb.d/009_business_permissions.up.sql:ro
      - ./migrations/010_admin_user_real_name.up.sql:/docker-entrypoint-initdb.d/010_admin_user_real_name.up.sql:ro
      - ./migrations/011_permission_version.up.sql:/docker-entrypoint-initdb.d/011_permission_version.up.sql:ro

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: development
      HTTP_ADDR: :8800
      DATABASE_DSN: postgres://auth_service:root@postgres:5432/mydb?sslmode=disable
      REDIS_ADDR: redis:6379
      CORS_ORIGINS: "http://localhost:60001,http://localhost:60002"
      JWT_SECRET: change-me-to-a-long-random-secret
      PASSWORD_CRYPTO_KEY: dev-crypto-key-16b
      SEED_USERNAME: test
      SEED_PASSWORD: Aa123456
    ports:
      - "8800:8800"

volumes:
  postgres-data:
