services:
  postgres:
    image: postgres:17.9
    environment:
      POSTGRES_USER: auth_service
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: development
      HTTP_ADDR: :8800
      DATABASE_DSN: postgres://auth_service:root@postgres:5432/mydb?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me-to-a-long-random-secret
      PASSWORD_CRYPTO_KEY: change-me-for-password-compat-encryption
      SEED_USERNAME: test
      SEED_PASSWORD: Aa123456
    ports:
      - "8800:8800"

volumes:
  postgres-data:
